<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inverted Pendulum — Open Loop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 20px;
  }
  .app { max-width: 1000px; margin: 0 auto; }
  h1 { text-align: center; font-size: 1.8rem; color: #60a5fa; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #9ca3af; font-size: 0.88rem; margin-bottom: 20px; }

  .canvas-wrapper {
    background: #1a1d27;
    border: 1px solid #2d3748;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  #simCanvas { display: block; width: 100%; }

  .controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .controls button {
    padding: 8px 22px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
  }
  #btnPause { background: #3b82f6; color: #fff; }
  #btnReset { background: #ef4444; color: #fff; }
  .controls button:hover { opacity: 0.85; }

  .telemetry {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .tel-item {
    background: #1f2937;
    border-radius: 8px;
    padding: 10px 16px;
    text-align: center;
    min-width: 100px;
  }
  .tel-label { font-size: 0.7rem; color: #6b7280; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
  .tel-value { font-size: 1.15rem; font-weight: 700; font-family: 'Courier New', monospace; color: #60a5fa; }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-box { background: #1a1d27; border: 1px solid #2d3748; border-radius: 10px; overflow: hidden; }
  .chart-title { padding: 7px 12px; font-size: 0.75rem; color: #9ca3af; border-bottom: 1px solid #2d3748; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .chart-box canvas { display: block; width: 100%; }

  @media (max-width: 600px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <h1>Inverted Pendulum — Manual Control</h1>
  <p class="subtitle">x₀ = 0 m &nbsp;·&nbsp; ẋ₀ = 0 &nbsp;·&nbsp; θ₀ = 5° &nbsp;·&nbsp; θ̇₀ = 0 &nbsp;·&nbsp; ← → arrow keys to push cart</p>

  <div class="canvas-wrapper">
    <canvas id="simCanvas" width="900" height="260"></canvas>
  </div>

  <div class="controls">
    <button id="btnPause">Pause</button>
    <button id="btnReset">Reset</button>
    <button id="btnAuto" style="background:#059669;color:#fff;padding:8px 22px;border-radius:6px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;">Auto: OFF</button>
  </div>

  <div class="telemetry">
    <div class="tel-item"><div class="tel-label">Time (s)</div><div class="tel-value" id="tTime">0.00</div></div>
    <div class="tel-item"><div class="tel-label">x (m)</div><div class="tel-value" id="tX">0.000</div></div>
    <div class="tel-item"><div class="tel-label">ẋ (m/s)</div><div class="tel-value" id="tXd">0.000</div></div>
    <div class="tel-item"><div class="tel-label">θ (°)</div><div class="tel-value" id="tTheta">5.00</div></div>
    <div class="tel-item"><div class="tel-label">θ̇ (°/s)</div><div class="tel-value" id="tThetad">0.0</div></div>
    <div class="tel-item"><div class="tel-label">F manual (N)</div><div class="tel-value" id="tFManual">0</div></div>
    <div class="tel-item"><div class="tel-label">F auto (N)</div><div class="tel-value" id="tFLqr">0</div></div>
    <div class="tel-item"><div class="tel-label">F total (N)</div><div class="tel-value" id="tForce">0</div></div>
    <div class="tel-item"><div class="tel-label">Mode</div><div class="tel-value" id="tMode" style="font-size:.85rem;">—</div></div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <div class="chart-title">Cart position — x (m)</div>
      <canvas id="posCanvas" width="480" height="130"></canvas>
    </div>
    <div class="chart-box">
      <div class="chart-title">Pole angle — θ (°)</div>
      <canvas id="angCanvas" width="480" height="130"></canvas>
    </div>
    <div class="chart-box" style="grid-column: 1 / -1;">
      <div class="chart-title">Control input — F (N)</div>
      <canvas id="forceCanvas" width="960" height="100"></canvas>
    </div>
  </div>
</div>

<script>
// ── Physics ──────────────────────────────────────────────────────────────────
const P = { M: 1.0, m: 0.1, l: 0.5, g: 9.81, b: 0.1 };

function derivatives(s, F) {
  const [, xd, th, thd] = s;
  const { M, m, l, g, b } = P;
  const c = Math.cos(th), sn = Math.sin(th);
  const denom = M + m - m * c * c;
  const xdd   = (F - b * xd + m * l * thd * thd * sn - m * g * c * sn) / denom;
  const thdd  = ((M + m) * g * sn - c * (F - b * xd + m * l * thd * thd * sn)) / (l * denom);
  return [xd, xdd, thd, thdd];
}

function rk4(s, F, dt) {
  const k1 = derivatives(s, F);
  const k2 = derivatives(s.map((v, i) => v + 0.5 * dt * k1[i]), F);
  const k3 = derivatives(s.map((v, i) => v + 0.5 * dt * k2[i]), F);
  const k4 = derivatives(s.map((v, i) => v + dt * k3[i]), F);
  return s.map((v, i) => v + (dt / 6) * (k1[i] + 2*k2[i] + 2*k3[i] + k4[i]));
}

function makeInitialState() { return [0, 0, 90 * Math.PI / 180, 0]; }

// ── State ────────────────────────────────────────────────────────────────────
const DT = 0.01;
const HIST = 500;

const FORCE_MAG = 10;  // Newtons applied per key
const keysHeld  = new Set();

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();   // stop page from scrolling
    keysHeld.add(e.key);
  }
});
window.addEventListener('keyup', e => keysHeld.delete(e.key));

function manualForce() {
  let F = 0;
  if (keysHeld.has('ArrowLeft'))  F -= FORCE_MAG;
  if (keysHeld.has('ArrowRight')) F += FORCE_MAG;
  return F;
}

// ── Angle helper ──────────────────────────────────────────────────────────────
function wrapAngle(th) {
  return ((th + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
}

// ── LQR  (scipy solve_continuous_are, Q=diag(1,1,10,10), R=0.1) ──────────────
const K_LQR = [-3.1623, -6.2976, -54.8423, -15.5793];  // F = -K @ state

function lqrForce(s) {
  const sw = [s[0], s[1], wrapAngle(s[2]), s[3]];  // feed wrapped angle
  const F  = -(K_LQR[0]*sw[0] + K_LQR[1]*sw[1] + K_LQR[2]*sw[2] + K_LQR[3]*sw[3]);
  return Math.max(-30, Math.min(30, F));
}

// ── Swing-up  (energy-based, Åström-Furuta) ───────────────────────────────────
const E_UPRIGHT  = P.m * P.g * P.l;   // target energy at upright
const K_SWINGUP  = 2.0;
const SWITCH_DEG = 30.0;               // hand-off to LQR within ±30°
const SWITCH_VEL = 4.0;               // …and angular velocity < 4 rad/s

function swingupForce(s) {
  const th = s[2], thd = s[3];
  const E  = 0.5 * P.m * P.l**2 * thd**2 + P.m * P.g * P.l * Math.cos(th);
  const dE = E - E_UPRIGHT;
  return Math.max(-30, Math.min(30, K_SWINGUP * thd * Math.cos(th) * dE));
}

function autoForce(s) {
  const thw = wrapAngle(s[2]);
  if (Math.abs(thw) < SWITCH_DEG * Math.PI / 180 && Math.abs(s[3]) < SWITCH_VEL)
    return { F: lqrForce(s),     mode: 'LQR' };
  return   { F: swingupForce(s), mode: 'Swing-up' };
}

let autoOn = false;

let state    = makeInitialState();
let posHist   = [];
let angHist   = [];
let forceHist = [];
let simTime   = 0;
let acc      = 0;
let lastTs   = null;
let paused   = false;
let rafId    = null;

// ── Drawing ───────────────────────────────────────────────────────────────────
const simCanvas   = document.getElementById('simCanvas');
const posCanvas   = document.getElementById('posCanvas');
const angCanvas   = document.getElementById('angCanvas');
const forceCanvas = document.getElementById('forceCanvas');

function drawSim(s) {
  const ctx = simCanvas.getContext('2d');
  const W = simCanvas.width, H = simCanvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1d27';
  ctx.fillRect(0, 0, W, H);

  const TRACK_HALF = 2.4;           // metres
  const scale  = W / (TRACK_HALF * 2 * 2.4);  // px/m
  const groundY = H * 0.70;
  const cx = W / 2 + s[0] * scale;

  // Track line
  ctx.strokeStyle = '#374151';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY + 18);
  ctx.lineTo(W, groundY + 18);
  ctx.stroke();

  // Track limit markers
  const limPx = TRACK_HALF * scale;
  ctx.strokeStyle = '#ef4444';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  for (const side of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(W/2 + side * limPx, groundY - 50);
    ctx.lineTo(W/2 + side * limPx, groundY + 22);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Cart
  const cW = 60, cH = 28;
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath();
  ctx.roundRect(cx - cW/2, groundY - cH, cW, cH, 5);
  ctx.fill();

  // Wheels
  for (const dx of [-18, 18]) {
    ctx.beginPath();
    ctx.arc(cx + dx, groundY + 4, 9, 0, Math.PI * 2);
    ctx.fillStyle = '#1e293b';
    ctx.fill();
    ctx.strokeStyle = '#60a5fa';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Pole
  const poleLen = P.l * 2 * scale;
  const px = cx + poleLen * Math.sin(s[2]);
  const py = groundY - cH/2 - poleLen * Math.cos(s[2]);

  ctx.strokeStyle = '#f97316';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, groundY - cH/2);
  ctx.lineTo(px, py);
  ctx.stroke();

  // Bob
  ctx.fillStyle = '#fbbf24';
  ctx.beginPath();
  ctx.arc(px, py, 9, 0, Math.PI * 2);
  ctx.fill();
}

function drawChart(canvas, data, color, yMin, yMax, label) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#1a1d27';
  ctx.fillRect(0, 0, W, H);

  // Zero line
  const zeroY = H - (0 - yMin) / (yMax - yMin) * H;
  ctx.strokeStyle = '#374151';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, zeroY);
  ctx.lineTo(W, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  if (data.length < 2) return;

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = (i / (HIST - 1)) * W;
    const y = H - (Math.max(yMin, Math.min(yMax, v)) - yMin) / (yMax - yMin) * H;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Label with current value
  const last = data[data.length - 1];
  ctx.fillStyle = color;
  ctx.font = '12px monospace';
  ctx.fillText(`${label} = ${last.toFixed(3)}`, 8, 16);
}

function updateTelemetry(s, t) {
  document.getElementById('tTime').textContent   = t.toFixed(2);
  document.getElementById('tX').textContent      = s[0].toFixed(3);
  document.getElementById('tXd').textContent     = s[1].toFixed(3);
  let dispDeg = s[2] * 180 / Math.PI;
  dispDeg = ((dispDeg % 360) + 360) % 360;
  document.getElementById('tTheta').textContent  = dispDeg.toFixed(2);
  document.getElementById('tThetad').textContent = (s[3] * 180 / Math.PI).toFixed(1);
}

// ── Loop ──────────────────────────────────────────────────────────────────────
function tick(ts) {
  rafId = requestAnimationFrame(tick);
  if (paused) return;

  if (lastTs === null) { lastTs = ts; return; }
  const real = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  acc += real;

  let Fm = 0, Fl = 0, F = 0, currentMode = '—';

  while (acc >= DT) {
    acc -= DT;
    Fm = manualForce();
    if (autoOn) {
      const res = autoForce(state);
      Fl = res.F;  currentMode = res.mode;
    } else {
      Fl = 0;  currentMode = '—';
    }
    F = Fm + Fl;

    state = rk4(state, F, DT);
    simTime += DT;

    posHist.push(state[0]);
    let deg = state[2] * 180 / Math.PI;
    deg = ((deg % 360) + 360) % 360;
    angHist.push(deg);
    forceHist.push(F);
    if (posHist.length > HIST) { posHist.shift(); angHist.shift(); forceHist.shift(); }
  }

  document.getElementById('tFManual').textContent = Fm.toFixed(1);
  document.getElementById('tFLqr').textContent    = Fl.toFixed(1);
  document.getElementById('tForce').textContent   = F.toFixed(1);
  document.getElementById('tMode').textContent    = currentMode;

  drawSim(state);
  const posMin = Math.min(...posHist, -0.1);
  const posMax = Math.max(...posHist,  0.1);
  drawChart(posCanvas, posHist, '#60a5fa', posMin, posMax, 'x (m)');
  const angMin = Math.min(...angHist,  -5);
  const angMax = Math.max(...angHist, 365);
  drawChart(angCanvas, angHist, '#f97316', angMin, angMax, 'θ (°)');
  const fAbsMax = Math.max(Math.max(...forceHist.map(Math.abs)), FORCE_MAG);
  drawChart(forceCanvas, forceHist, '#a78bfa', -fAbsMax, fAbsMax, 'F (N)');
  updateTelemetry(state, simTime);
}

// ── Controls ──────────────────────────────────────────────────────────────────
document.getElementById('btnPause').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('btnPause').textContent = paused ? 'Resume' : 'Pause';
  if (!paused) lastTs = null;
});

document.getElementById('btnReset').addEventListener('click', () => {
  state      = makeInitialState();
  posHist    = [];
  angHist    = [];
  forceHist  = [];
  simTime = 0;
  acc     = 0;
  lastTs  = null;
  paused  = false;
  document.getElementById('btnPause').textContent = 'Pause';
  updateTelemetry(state, 0);
});

document.getElementById('btnAuto').addEventListener('click', () => {
  autoOn = !autoOn;
  const btn = document.getElementById('btnAuto');
  btn.textContent = autoOn ? 'Auto: ON' : 'Auto: OFF';
  btn.style.background = autoOn ? '#dc2626' : '#059669';
});

// ── Start ─────────────────────────────────────────────────────────────────────
drawSim(state);
updateTelemetry(state, 0);
rafId = requestAnimationFrame(tick);
</script>
</body>
</html>
